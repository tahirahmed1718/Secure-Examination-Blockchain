{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="neu-card p-5">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h4 class="fw-bold m-0">Upload Paper</h4>
                <span class="neu-nav-pill px-3 py-1 small text-success">
                    <i class="fa-solid fa-circle small me-1"></i> Connected
                </span>
            </div>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="small fw-bold text-muted ms-3 mb-2">SUBJECT NAME</label>
                    <input type="text" name="subject" class="form-control form-control-lg" placeholder="Mathematics 101" required>
                </div>
                
                <div class="mb-5">
                    <label class="small fw-bold text-muted ms-3 mb-2">EXAM FILE</label>
                    <div class="form-control text-center p-5" style="border-radius: 20px;">
                        <i class="fa-solid fa-cloud-arrow-up fa-3x text-muted mb-3 opacity-50"></i>
                        <input type="file" name="paper" class="form-control mb-2" accept="application/pdf" required>
                        <small class="text-muted">PDF Format Only • AES-256 Encryption</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3">
                    <i class="fa-solid fa-lock me-2"></i> Encrypt & Upload
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
